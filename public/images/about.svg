<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <defs>
    <radialGradient id="bg-grad" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#F4EAD5"/>
      <stop offset="100%" stop-color="#FBF6EC"/>
    </radialGradient>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B5862D"/>
      <stop offset="50%" stop-color="#E6C373"/>
      <stop offset="100%" stop-color="#C9A24B"/>
    </linearGradient>
    <linearGradient id="silver-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A8A8A8"/>
      <stop offset="50%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#C0C0C0"/>
    </linearGradient>
    <linearGradient id="burgundy-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A8425B"/>
      <stop offset="100%" stop-color="#6B0E2A"/>
    </linearGradient>
    <filter id="soft-shadow">
      <feGaussianBlur stdDeviation="3"/>
      <feOffset dx="2" dy="4" result="offsetblur"/>
      <feFlood flood-color="#000000" flood-opacity="0.2"/>
      <feComposite in2="offsetblur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="800" height="800" fill="url(#bg-grad)"/>
  
    <g transform="translate(400, 400)">
      <circle r="200" fill="url(#bg-grad)" stroke="url(#gold-grad)" stroke-width="2" opacity="0.5"/>
      <circle r="160" fill="none" stroke="url(#gold-grad)" stroke-width="1" opacity="0.4"/>
      <!-- Brand monogram "N" -->
      <text y="50" text-anchor="middle" font-family="Georgia, serif" font-size="200" font-weight="700" fill="url(#burgundy-grad)" font-style="italic">N</text>
      <text y="120" text-anchor="middle" font-family="Georgia, serif" font-size="24" fill="#C9A24B" letter-spacing="8">HOUSE OF NEELAM</text>
    </g>
  
</svg>